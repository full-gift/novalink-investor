<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NovaLink">
<meta name="theme-color" content="#09090B">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>NovaLink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#09090B!important;height:100%}
body{background:#09090B!important;color:#EDEDEF;font-family:'Noto Sans JP',system-ui,-apple-system,sans-serif;min-height:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:#09090B;position:relative;padding-bottom:env(safe-area-inset-bottom)}
.header{padding:calc(env(safe-area-inset-top,12px)+12px) 20px 10px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#C5963A,#DEB560);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#0A0A0C}
.logo-text{font-weight:700;font-size:17px;letter-spacing:-.01em}
.portfolio{margin:16px 20px 0;background:linear-gradient(160deg,#17171C,#111114);border:1px solid #27272E;border-radius:18px;padding:24px 22px 20px;position:relative;overflow:hidden}
.portfolio::after{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(197,150,58,.06) 0%,transparent 70%);pointer-events:none}
.pf-label{font-size:11px;font-weight:500;color:#6E6E7A;letter-spacing:.06em;margin-bottom:8px}
.pf-amount{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;letter-spacing:-.03em;line-height:1.1;color:#F4F4F5}
.pf-amount .yen{font-size:22px;font-weight:500;color:#8A8A96;margin-right:3px}
.pf-sub{display:flex;align-items:center;gap:10px;margin-top:10px}
.pf-gain{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#34D399}
.pf-gain svg{width:14px;height:14px;flex-shrink:0}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 20px 0}
.m-card{background:#111114;border:1px solid #222228;border-radius:14px;padding:16px 14px}
.m-label{font-size:11px;font-weight:500;color:#6E6E7A;margin-bottom:6px}
.m-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:#EDEDEF}
.m-note{font-size:11px;color:#4ADE80;margin-top:3px;font-weight:500}
.sec-head{padding:24px 20px 10px;font-size:14px;font-weight:700;color:#EDEDEF}
.holding{margin:0 20px;background:#111114;border:1px solid #222228;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px}
.h-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#C5963A,#DEB560);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#0A0A0C;flex-shrink:0}
.h-info{flex:1;min-width:0}.h-name{font-size:14px;font-weight:600}.h-detail{font-size:12px;color:#6E6E7A;margin-top:2px}
.h-right{text-align:right}.h-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}.h-pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:#4ADE80;margin-top:2px}
.order-item{margin:0 20px;padding:14px 0;border-bottom:1px solid #1A1A1F;display:flex;align-items:center;gap:12px}
.o-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.o-badge.pending{background:rgba(251,191,36,.06);color:#FBBF24}
.o-badge.approved{background:rgba(74,222,128,.06);color:#4ADE80}
.o-badge.rejected{background:rgba(248,113,113,.06);color:#F87171}
.o-badge.withdraw{background:rgba(139,92,246,.06);color:#A78BFA}
.o-info{flex:1}.o-title{font-size:13px;font-weight:600}.o-meta{font-size:11px;color:#6E6E7A;margin-top:1px}
.o-amount{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:right}

/* Bottom bar - 2 buttons */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:8px 16px calc(8px + env(safe-area-inset-bottom));background:#09090B;border-top:1px solid #27272E;z-index:100;display:flex;gap:6px}
.bar-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0;border:none;border-radius:14px;cursor:pointer;-webkit-appearance:none;transition:all .15s}
.bar-btn svg{width:22px;height:22px;stroke-width:1.8}
.bar-btn span{font-family:'Noto Sans JP',sans-serif;font-size:10px;font-weight:700;letter-spacing:.3px}
.bar-buy{background:#161619;border:1px solid #27272E;color:#EDEDEF}
.bar-buy:active{background:#1E1E22}
.bar-buy svg{stroke:#EDEDEF}
.bar-rcv{background:#161619;border:1px solid #27272E;color:#6E6E7A}
.bar-rcv:active{opacity:.85}
.bar-rcv svg{stroke:#6E6E7A}
.bar-rcv.active{background:linear-gradient(135deg,#C5963A,#DEB560);color:#0A0A0C;border:none;box-shadow:0 4px 16px rgba(197,150,58,.3);animation:rcv-pulse 2s ease-in-out infinite}
.bar-rcv.active svg{stroke:#0A0A0C}
@keyframes rcv-pulse{0%,100%{box-shadow:0 4px 16px rgba(197,150,58,.3)}50%{box-shadow:0 4px 24px rgba(197,150,58,.5)}}
.bar-sell{background:#161619;border:1px solid #27272E;color:#EDEDEF}
.bar-sell:active{background:#1E1E22}
.bar-sell svg{stroke:#EDEDEF}
.bar-sell:disabled{opacity:.3;cursor:default}

/* Overlay & sheets */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:#111114;border-top-left-radius:22px;border-top-right-radius:22px;padding:14px 20px calc(24px + env(safe-area-inset-bottom));z-index:201;transition:transform .38s cubic-bezier(.32,.72,0,1)}
.sheet.on{transform:translateX(-50%) translateY(0)}
.sheet-bar{width:40px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:4px}
.sheet-sub{font-size:12px;color:#6E6E7A;margin-bottom:20px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.preset{height:56px;border:1px solid #27272E;border-radius:12px;background:#161619;color:#EDEDEF;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-appearance:none;transition:all .15s}
.preset span{font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#6E6E7A;font-weight:400;margin-top:2px}
.preset:active,.preset.on{border-color:#C5963A;background:rgba(197,150,58,.05)}
.custom-wrap{margin-bottom:18px}
.custom-label{font-size:12px;color:#8A8A96;margin-bottom:8px;display:block}
.custom-input{width:100%;height:50px;padding:0 14px;background:#161619;border:1px solid #27272E;border-radius:12px;color:#EDEDEF;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;outline:none;-webkit-appearance:none}
.custom-input:focus{border-color:#C5963A}
.custom-input::placeholder{color:#444;font-weight:400}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:13px;border-bottom:1px solid #1A1A1F}
.detail-row .dk{color:#6E6E7A}.detail-row .dv{font-family:'JetBrains Mono',monospace;font-weight:600}
.confirm-btn{width:100%;height:54px;border:none;border-radius:14px;background:linear-gradient(135deg,#C5963A,#DEB560);color:#0A0A0C;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;-webkit-appearance:none}
.confirm-btn:active{opacity:.82}
.confirm-btn:disabled{opacity:.35;cursor:default}

/* Withdraw sheet */
.wd-amount{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;margin:12px 0 6px;color:#F4F4F5}
.wd-amount .yen{font-size:18px;color:#8A8A96;margin-right:2px}
.wd-note{font-size:12px;color:#6E6E7A;margin-bottom:20px;line-height:1.6}
.wd-btn{width:100%;height:54px;border:none;border-radius:14px;background:#A78BFA;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;-webkit-appearance:none}
.wd-btn:active{opacity:.82}
.wd-btn:disabled{opacity:.35;cursor:default}

.toast{position:fixed;top:calc(env(safe-area-inset-top,12px)+16px);left:50%;transform:translateX(-50%) translateY(-100px);background:#111114;color:#EDEDEF;border:1px solid #27272E;font-size:14px;font-weight:600;padding:12px 24px;border-radius:14px;z-index:300;transition:transform .4s cubic-bezier(.32,.72,0,1);white-space:nowrap;max-width:88%;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.on{transform:translateX(-50%) translateY(0)}
.spacer{height:90px}
.loading{text-align:center;padding:60px 20px;color:#6E6E7A;font-size:14px}

/* Ranking */
.rank-header{display:flex;justify-content:space-between;align-items:center;padding:24px 20px 8px}
.rank-header .sec-head{padding:0;margin:0}
.rank-mine{margin:8px 20px 12px;background:linear-gradient(160deg,#1A1608,#12100A);border:1px solid rgba(197,150,58,.2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.rank-mine-num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:#C5963A;min-width:44px;text-align:center}
.rank-mine-num small{font-size:11px;font-weight:500;color:#6E6E7A}
.rank-mine-info{flex:1}
.rank-mine-label{font-size:10px;color:#6E6E7A;margin-bottom:2px}
.rank-mine-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#4ADE80}
.rk-row{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid #151518}
.rk-row:last-child{border-bottom:none}
.rk-row.me{background:rgba(197,150,58,.04);border-radius:10px;border-bottom-color:transparent;position:relative}
.rk-row.me::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:#C5963A;border-radius:0 3px 3px 0}
.rk-pos{width:36px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#6E6E7A;flex-shrink:0}
.rk-row.me .rk-pos{color:#C5963A}
.rk-pos.p1{color:#C5963A}.rk-pos.p2{color:#94A3B8}.rk-pos.p3{color:#D97706}
.rk-pos .rk-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;letter-spacing:0}
.rk-pos.p1 .rk-badge{background:linear-gradient(135deg,#C5963A,#DEB560);color:#0A0A0C}
.rk-pos.p2 .rk-badge{background:linear-gradient(135deg,#64748B,#94A3B8);color:#0A0A0C}
.rk-pos.p3 .rk-badge{background:linear-gradient(135deg,#B45309,#D97706);color:#0A0A0C}
.rk-bar{flex:1;margin:0 12px}
.rk-bar-track{height:5px;background:#151518;border-radius:3px;overflow:hidden}
.rk-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#C5963A,#DEB560);transition:width .5s ease-out}
.rk-row.me .rk-bar-fill{background:linear-gradient(90deg,#C5963A,#F5D98A)}
.rk-gain{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:#4ADE80;text-align:right;min-width:80px}
.rk-gain.neg{color:#F87171}

/* BBS embedded */
.bbs-hd{margin:24px 20px 0;background:#111110;border:1px solid #1E1D18;border-radius:14px 14px 0 0;padding:14px 16px 10px;border-bottom:2px solid #C5963A}
.bbs-title{font-size:14px;font-weight:700}
.bbs-title em{font-style:normal;background:linear-gradient(135deg,#C5963A,#DEB560);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bbs-info{display:flex;gap:14px;margin-top:4px;font-size:10px;color:#6E6E7A;font-family:'JetBrains Mono',monospace}
.bbs-info .live{color:#4ADE80}
.bbs-info .live::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#4ADE80;margin-right:3px;vertical-align:middle}
.bbs-notice{margin:0 20px;padding:6px 14px;font-size:10px;color:#6E6E7A;background:#0E0E0C;border-left:1px solid #1E1D18;border-right:1px solid #1E1D18;text-align:center}
.bbs-thread{margin:0 20px;background:#0C0C0A;border-left:1px solid #1E1D18;border-right:1px solid #1E1D18;border-bottom:1px solid #1E1D18;border-radius:0 0 14px 14px}
.bbs-post{padding:12px 14px;border-bottom:1px solid #131310}
.bbs-post:last-child{border-bottom:none}
.bbs-post-head{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.bbs-post-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#C5963A}
.bbs-post-name{font-size:11px;font-weight:600;color:#4ADE80}
.bbs-post-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:#4A4A4A;margin-left:auto}
.bbs-post-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:#3A3A3A}
.bbs-post-body{font-size:12.5px;line-height:1.7;color:#D4D4D8;word-break:break-word}
.bbs-empty{text-align:center;padding:24px;color:#3A3A3A;font-size:12px}
.bbs-more{display:block;margin:10px 20px 0;text-align:center;font-size:12px;color:#C5963A;text-decoration:none;padding:10px;background:#111110;border:1px solid #1E1D18;border-radius:10px;font-weight:600}

@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.an{animation:up .5s ease-out both}
.a1{animation-delay:.04s}.a2{animation-delay:.08s}.a3{animation-delay:.12s}.a4{animation-delay:.16s}.a5{animation-delay:.2s}
/* Fake notification */
.fake-notif{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 80px);left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1F;border:1px solid #27272E;border-radius:14px;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:200;transition:transform .5s cubic-bezier(.32,.72,0,1),opacity .5s;opacity:0;max-width:92%;white-space:nowrap}
.fake-notif.show{transform:translateX(-50%) translateY(0);opacity:1}
.fake-notif-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#4ADE80,#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;flex-shrink:0}
.fake-notif-text{font-size:12px;color:#EDEDEF;font-weight:600}
.fake-notif-sub{font-size:10px;color:#6E6E7A;font-weight:400}
/* Combined info card */
.info-card{margin:12px 20px 0;border-radius:14px;overflow:hidden;animation:sale-glow 2s ease-in-out infinite}
.info-card.closed{animation:none}
.info-top{background:linear-gradient(135deg,#C5963A,#A67C2E);padding:12px 16px;display:flex;align-items:center;gap:10px}
.info-card.closed .info-top{background:linear-gradient(135deg,#3F3F46,#27272A)}
@keyframes sale-glow{0%,100%{box-shadow:0 2px 12px rgba(197,150,58,.15)}50%{box-shadow:0 2px 20px rgba(197,150,58,.35)}}
.sale-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sale-info{flex:1}
.sale-title{font-size:12px;font-weight:700;color:#fff}
.sale-timer{font-size:18px;font-weight:800;color:#FEE2E2;font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-top:2px}
.sale-label{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.info-divider{height:1px;background:#27272E}
.info-bottom{background:#111115;padding:12px 16px;display:flex;align-items:center;gap:10px}
.cum-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#C5963A,#DEB560);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cum-icon svg{width:18px;height:18px;stroke:#0A0A0C}
.cum-info{flex:1}
.cum-label{font-size:10px;color:#6E6E7A;font-weight:600;letter-spacing:.5px}
.cum-val{font-size:17px;font-weight:800;color:#EDEDEF;margin-top:1px}
.cum-users{font-size:10px;color:#6E6E7A;margin-left:auto;text-align:right}
.cum-users b{color:#EDEDEF;font-size:13px}
.chart-wrap{padding:0 20px;margin:14px 0 4px}
.chart-card{background:#17171C;border:1px solid #27272E;border-radius:14px;overflow:hidden}
.chart-hdr{display:flex;justify-content:space-between;align-items:flex-end;padding:14px 16px 6px}
.chart-pair{font-size:13px;font-weight:700;color:#E8E8E8;display:flex;align-items:center;gap:6px}
.chart-pair-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.chart-price{font-size:22px;font-weight:800;color:#F5F5F5;margin-top:2px}
.chart-chg{font-size:11px;font-weight:600;margin-top:1px}
.chart-chg.up{color:#4ADE80}.chart-chg.dn{color:#F87171}
.tf-tabs{display:flex;gap:4px;padding:4px 16px 8px}
.tf{padding:4px 11px;font-size:10px;font-weight:700;border-radius:5px;cursor:pointer;color:#6B7280;background:transparent;border:none;transition:all .15s;letter-spacing:.3px}
.tf.on{background:#C5963A;color:#111}
.chart-canvas{display:block;width:100%;height:200px}
.chart-foot{display:flex;justify-content:space-between;padding:6px 16px 10px;font-size:9px;color:#4B5563}
.notif-bar{margin:12px 20px 0;display:flex;align-items:center;gap:10px;background:#17171C;border:1px solid #27272E;border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .15s}
.notif-bar:active{transform:scale(0.98)}
.notif-bar.on{border-color:#C5963A}
.notif-icon{width:20px;height:20px;color:#6B7280}
.notif-bar.on .notif-icon{color:#C5963A}
.notif-text{flex:1;font-size:12px;color:#9CA3AF}
.notif-bar.on .notif-text{color:#E8E8E8}
.notif-toggle{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;background:#27272E;color:#6B7280;border:none}
.notif-bar.on .notif-toggle{background:#C5963A;color:#111}
</style>
</head>
<body>
<div class="app">
<div class="toast" id="toast"></div>
<div class="header an a1"><div class="logo"><div class="logo-mark">NL</div><div class="logo-text">NovaLink</div></div></div>
<div id="main"><div class="loading">読み込み中...</div></div>

<div class="bottom-bar">
  <button class="bar-btn bar-buy" id="orderTrigger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14"/><path d="M5 12l7 7 7-7"/></svg><span>入金</span></button>
  <button class="bar-btn bar-rcv" id="receiveTrigger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8"/><path d="M12 8v8"/></svg><span>受取</span></button>
  <button class="bar-btn bar-sell" id="withdrawTrigger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg><span>出金</span></button>
</div>

<!-- Buy sheet -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-bar"></div>
  <div class="sheet-title">追加注文</div>
  <div class="sheet-sub">C種優先株式 · ¥32,000 / 株</div>
  <div class="preset-grid">
    <button class="preset" data-a="96000">¥96,000<span>3株</span></button>
    <button class="preset" data-a="320000">¥320,000<span>10株</span></button>
    <button class="preset" data-a="1600000">¥1,600,000<span>50株</span></button>
    <button class="preset" data-a="3200000">¥3,200,000<span>100株</span></button>
  </div>
  <div class="custom-wrap"><label class="custom-label">株数を直接入力</label><input type="number" class="custom-input" id="inputShares" inputmode="numeric" placeholder="例: 25" min="1"></div>
  <div class="detail-row"><span class="dk">注文株数</span><span class="dv" id="dShares">—</span></div>
  <div class="detail-row"><span class="dk">注文金額</span><span class="dv" id="dAmount">—</span></div>
  <button class="confirm-btn" id="confirmBtn" disabled>注文を確定する</button>
</div>

<!-- Withdraw sheet -->
<div class="sheet" id="wdSheet">
  <div class="sheet-bar"></div>
  <div class="sheet-title">利益確定（出金）</div>
  <div class="sheet-sub">現在の評価額を全額出金申請します</div>
  <div class="detail-row"><span class="dk">評価額</span><span class="dv" id="wdVal">—</span></div>
  <div class="detail-row"><span class="dk">投資額</span><span class="dv" id="wdDep">—</span></div>
  <div class="detail-row"><span class="dk">利益</span><span class="dv" id="wdGain" style="color:#4ADE80">—</span></div>
  <div class="wd-note">出金申請後、管理者の承認を経て出金手続きが完了します。</div>
  <button class="wd-btn" id="wdBtn">出金を申請する</button>
</div>

</div>
<script>
var API=location.origin,PRICE=32000;
var uid=null,selShares=0,currentData=null;
function $(id){return document.getElementById(id)}
function fY(n){return '\u00a5'+Math.round(n).toLocaleString('ja-JP')}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2800)}
function getUID(){var m=document.cookie.match(/nluid=([^;]+)/);return m?m[1]:null}
function setUID(id){document.cookie='nluid='+id+';path=/;max-age=31536000;SameSite=Lax'}
async function api(p,o){o=o||{};var h=Object.assign({'Content-Type':'application/json'},o.headers||{});return(await fetch(API+p,Object.assign({},o,{headers:h}))).json()}

// Sheet management
function openSheet(id){$('overlay').classList.add('on');$(id).classList.add('on')}
function closeAll(){$('overlay').classList.remove('on');$('sheet').classList.remove('on');$('wdSheet').classList.remove('on')}
function resetBuySheet(){selShares=0;document.querySelectorAll('.preset').forEach(function(p){p.classList.remove('on')});$('inputShares').value='';$('dShares').textContent='\u2014';$('dAmount').textContent='\u2014';$('confirmBtn').disabled=true}
function setSel(s){selShares=s;$('dShares').textContent=s.toLocaleString('ja-JP')+'\u682a';$('dAmount').textContent=fY(s*PRICE);$('confirmBtn').disabled=false}

// Buy presets
document.querySelectorAll('.preset').forEach(function(p){p.addEventListener('click',function(){document.querySelectorAll('.preset').forEach(function(x){x.classList.remove('on')});p.classList.add('on');$('inputShares').value='';setSel(Math.floor(parseInt(p.dataset.a)/PRICE))})});
$('inputShares').addEventListener('input',function(){document.querySelectorAll('.preset').forEach(function(x){x.classList.remove('on')});var v=parseInt($('inputShares').value);if(v>0){setSel(v)}else{selShares=0;$('dShares').textContent='\u2014';$('dAmount').textContent='\u2014';$('confirmBtn').disabled=true}});

$('overlay').addEventListener('click',closeAll);
$('orderTrigger').addEventListener('click',function(){resetBuySheet();openSheet('sheet')});
$('receiveTrigger').addEventListener('click',function(){
  if(!currentData||!currentData.orders)return toast('\u307e\u305a\u6ce8\u6587\u3092\u7533\u8acb\u3057\u3066\u304f\u3060\u3055\u3044');
  var hasApproved=currentData.orders.some(function(o){return o.type==='buy'&&o.status==='approved'});
  if(!hasApproved)return toast('\u6ce8\u6587\u304c\u627f\u8a8d\u3055\u308c\u3066\u3044\u307e\u305b\u3093');
  location.href='/deposit';
});
$('withdrawTrigger').addEventListener('click',function(){
  if(!currentData||currentData.totalValue<=0||currentData.hasPendingWithdraw)return;
  $('wdVal').textContent=fY(currentData.totalValue);
  $('wdDep').textContent=fY(currentData.totalDeposited);
  var g=currentData.totalValue-currentData.totalDeposited;
  $('wdGain').textContent=(g>=0?'+':'')+fY(g);
  $('wdGain').style.color=g>=0?'#4ADE80':'#F87171';
  $('wdBtn').disabled=false;$('wdBtn').textContent='\u51fa\u91d1\u3092\u7533\u8acb\u3059\u308b';
  openSheet('wdSheet');
});

// Confirm buy
$('confirmBtn').addEventListener('click',async function(){
  if(selShares<=0)return;$('confirmBtn').disabled=true;$('confirmBtn').textContent='\u9001\u4fe1\u4e2d...';
  try{await api('/api/order',{method:'POST',body:JSON.stringify({uid:uid,amount:selShares*PRICE,shares:selShares})});closeAll();toast('\u6ce8\u6587\u3092\u53d7\u3051\u4ed8\u3051\u307e\u3057\u305f');setTimeout(load,500)}catch(e){toast('\u30a8\u30e9\u30fc\u304c\u767a\u751f\u3057\u307e\u3057\u305f')}
  $('confirmBtn').textContent='\u6ce8\u6587\u3092\u78ba\u5b9a\u3059\u308b';
});

// Confirm withdraw
$('wdBtn').addEventListener('click',async function(){
  if(!currentData||currentData.totalValue<=0)return;
  $('wdBtn').disabled=true;$('wdBtn').textContent='\u9001\u4fe1\u4e2d...';
  try{await api('/api/withdraw',{method:'POST',body:JSON.stringify({uid:uid,amount:currentData.totalValue})});closeAll();toast('\u51fa\u91d1\u7533\u8acb\u3092\u53d7\u3051\u4ed8\u3051\u307e\u3057\u305f');setTimeout(load,500)}catch(e){toast(e.message||'\u30a8\u30e9\u30fc\u304c\u767a\u751f\u3057\u307e\u3057\u305f')}
  $('wdBtn').textContent='\u51fa\u91d1\u3092\u7533\u8acb\u3059\u308b';
});

// === Auto-generated BBS comments ===
function genFakeComments(d){
var seed=function(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)};
var rng=function(sd){return function(){sd=(sd*16807+0)%2147483647;return(sd-1)/2147483646}};
var day=d.daysSinceStart||1,mult=d.currentMultiplier||1,gain=d.gain||0;
var pool=[];
if(day<=1){pool.push(
'始めたばかりだけどもう動いてる','初日で倍超えてるんだが','とりあえず少額で様子見中','ここの運用チーム優秀じゃない？',
'友達に教えてもらって始めた','まだ半信半疑だけど数字は嘘つかない','少額でも増えてるの嬉しい','初日からこれは期待できる'
)}
if(day>=2&&day<=4){pool.push(
'まだ'+day+'日なのにx'+mult.toFixed(1)+'はやばい','3日で4倍超えてて草','追加入金するか迷ってる','含み益がどんどん増えていく',
'チャート見るのが楽しみになってきた','x'+mult.toFixed(1)+'とか夢がある','毎日チェックするのが日課になった',
'これ複利で回したらすごいことになりそう','知り合いにも勧めてみた','>>前の人 自分も同じタイミングで始めたよ',
'運用任せで楽なのがいい','朝起きて確認するのが楽しい'
)}
if(day==4||day==6||day==8){pool.push(
'ちょっと調整入ったな','一時的な下げでしょ、気にしてない','押し目で追加した人いる？',
'こういう揺れがあるほうがリアルで逆に安心する','すぐ戻るでしょ'
)}
if(day>=5&&day<=9){pool.push(
'もう'+day+'日目か、早いな','1週間でx'+mult.toFixed(1)+'はえぐい','ここまで安定してると信頼できる',
'出金するか迷うけどまだ伸びそう','利確したい気持ちを抑えてる','ガチホが正解だった',
'x'+mult.toFixed(1)+'達成おめ','最初に入れた人羨ましい','ここの掲示板の雰囲気いいね'
)}
if(day>=10){pool.push(
'10日目からの加速やばくない？','x'+mult.toFixed(1)+'とかもう笑うしかない','2週間で38倍って聞いてたけどマジでいきそう',
'後半の伸びがえぐい','ここから本番って感じする','もっと入れておけばよかった',
'出金組と追加組で分かれそう','税金のこと考え始めてるw'
)}
if(gain>0){pool.push(
'含み益'+Math.round(gain).toLocaleString('ja-JP')+'円いったわ',
'プラスで推移してるの安心する','この調子で頼む','利益出てるうちに追加しとこうかな',
'順調順調','今日もプラスで終わりそう'
)}
if(mult>=2){pool.push(
'x'+mult.toFixed(1)+'はさすがにすごい','初日で2倍超えるとは思わなかった',
'ここで追加した人も余裕でプラスだろうな','もっと早く始めればよかった'
)}
if(mult>=7){pool.push(
'7倍超えは草','1週間でこれは異次元','ここからさらに伸びるのか...'
)}
if(mult>=14){pool.push(
'14倍突破きた','加速フェーズ入った感ある','最終的に何倍までいくんだこれ'
)}
pool.push(
'みんな調子どう？','今日も平和だな','ここの民度高くて好き',
'他のとこより全然いい','運営さんありがとう','情報共有助かります',
'夜のチャート確認が日課','寝る前にチェック','おはよう、今日もいい感じ',
'週末も動いてるのありがたい','>>上 同意','わかる','それな',
'自分も最近始めた、よろしく','先輩方に質問なんですが追加入金っていつがベスト？','>>質問 早い方がいいと思う、複利効くし'
);
var now=Date.now();var dayMs=86400000;var startTs=now-day*dayMs;
var result=[];var perDay=Math.min(3+Math.floor(day*0.8),8);
for(var di=0;di<day;di++){
var daySeed=seed('day'+di+(uid||''));var r=rng(daySeed);
var count=Math.max(2,Math.floor(r()*perDay)+1);
for(var ci=0;ci<count;ci++){
var idx=Math.floor(r()*pool.length);
var hourBase=8+Math.floor(r()*14);var minOff=Math.floor(r()*60);
var ts=startTs+di*dayMs+hourBase*3600000+minOff*60000;
if(ts>now)continue;
result.push({id:'auto_'+di+'_'+ci,text:pool[idx],createdAt:ts});
}}
return result}

async function load(){
  var d=await api('/api/portfolio?uid='+uid);
  if(d.error==='user not found'){await api('/api/init',{method:'POST',body:JSON.stringify({uid:uid})});return load()}
  currentData=d;
  // Parallel fetch ranking + comments
  var _rkP=api('/api/ranking?uid='+uid).catch(function(){return null});
  var _cmP=api('/api/comments').catch(function(){return []});
  var _par=await Promise.all([_rkP,_cmP]);
  var rk=_par[0];var cmts=_par[1]||[];
  if(rk){window._rkData=rk}
  var up=d.gain>=0,pct=d.gainPct;
  var arrow=up?'M18 15l-6-6-6 6':'M6 9l6 6 6-6';
  var sign=up?'+':'';
  var gainColor=up?'#4ADE80':'#F87171';
  // Disable withdraw button if no value or pending
  $('withdrawTrigger').disabled=(d.totalValue<=0||d.hasPendingWithdraw);
  
  var h='<div class="portfolio an a2"><div class="pf-label">\u8a55\u4fa1\u984d</div>';
  h+='<div class="pf-amount"><span class="yen">\u00a5</span>'+d.totalValue.toLocaleString('ja-JP')+'</div>';
  h+='<div class="pf-sub"><span class="pf-gain" style="color:'+gainColor+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="'+arrow+'"/></svg>'+sign+fY(d.gain)+'\uff08'+sign+pct+'%\uff09</span></div></div>';
  h+='<div class="metrics an a3"><div class="m-card"><div class="m-label">\u6295\u8cc7\u984d</div><div class="m-val">'+fY(d.totalDeposited)+'</div><div class="m-note">\u5143\u672c</div></div>';
  h+='<div class="m-card"><div class="m-label">\u542b\u307f\u76ca</div><div class="m-val" style="color:'+gainColor+'">'+fY(Math.abs(d.gain))+'</div><div class="m-note">'+sign+pct+'%</div></div></div>';
  h+='<div class="info-card" id="saleBanner"><div class="info-top"><div class="sale-icon" id="saleIcon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div class="sale-info"><div class="sale-title" id="saleTitle">\u5165\u91d1\u53d7\u4ed8\u4e2d</div><div class="sale-timer" id="saleTimer">--:--:--</div><div class="sale-label" id="saleLabel">\u53d7\u4ed8\u7d42\u4e86\u307e\u3067</div></div></div><div class="info-divider"></div><div class="info-bottom"><div class="cum-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg></div><div class="cum-info"><div class="cum-label">\u7d2f\u8a08\u904b\u7528\u984d</div><div class="cum-val" id="cumVal">-</div></div><div class="cum-users"><div class="cum-label">\u904b\u7528\u4e2d</div><b id="cumUsers">-</b>\u540d</div></div></div>';
  
  h+='<div class="chart-wrap"><div class="chart-card"><div class="chart-hdr"><div><div class="chart-pair"><span class="chart-pair-dot"></span>Portfolio Performance</div><div class="chart-price" id="chartPrice">-</div><div class="chart-chg up" id="chartChg">-</div></div></div><div class="tf-tabs"><button class="tf on" data-tf="5m">5m</button><button class="tf" data-tf="15m">15m</button><button class="tf" data-tf="4h">4h</button></div><canvas class="chart-canvas" id="chartCanvas"></canvas><div class="chart-foot"><span id="chartRange">-</span><span id="chartVol">-</span></div></div></div>';
  h+='<div class="notif-bar'+(window._pushEnabled?' on':'')+'" id="notifBar" onclick="togglePush()"><svg class="notif-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div class="notif-text">'+(window._pushEnabled?'\u6bce\u65e517:00\u30fb19:00\u306b\u901a\u77e5':'\u6bce\u65e5\u306e\u901a\u77e5\u3092\u30d7\u30c3\u30b7\u30e5\u3067\u53d7\u3051\u53d6\u308b')+'</div><div class="notif-toggle">'+(window._pushEnabled?'ON':'OFF')+'</div></div>';

  if(d.totalValue>0){
    h+='<div class="sec-head an a4">\u4fdd\u6709\u9298\u67c4</div><div class="holding an a4"><div class="h-icon">NL</div><div class="h-info"><div class="h-name">\u682a\u5f0f\u4f1a\u793e\u30ce\u30f4\u30a1\u30ea\u30f3\u30af</div><div class="h-detail">C\u7a2e\u512a\u5148\u682a\u5f0f</div></div>';
    h+='<div class="h-right"><div class="h-val">'+fY(d.totalValue)+'</div><div class="h-pct" style="color:'+gainColor+'">'+sign+pct+'%</div></div></div>';
  }
  
  if(d.withdrawn>0){
    h+='<div class="metrics an a4" style="margin-top:10px"><div class="m-card" style="grid-column:1/-1"><div class="m-label">\u51fa\u91d1\u6e08\u307f</div><div class="m-val" style="color:#A78BFA">'+fY(d.withdrawn)+'</div></div></div>';
  }
  
  // Ranking section
  try{
    if(rk&&rk.ranking&&rk.ranking.length>0){
      h+='<div class="sec-head an a5">\u542b\u307f\u76ca\u30e9\u30f3\u30ad\u30f3\u30b0</div>';
      if(rk.myRank){
        h+='<div class="rank-mine an a5"><div class="rank-mine-num">'+rk.myRank.rank+'<small> / '+rk.totalUsers+'</small></div><div class="rank-mine-info"><div class="rank-mine-label">\u3042\u306a\u305f\u306e\u542b\u307f\u76ca</div><div class="rank-mine-val">'+(rk.myRank.gain>=0?'+':'')+fY(rk.myRank.gain)+'</div></div></div>';
      }
      var maxG=Math.max(1,Math.max.apply(null,rk.ranking.map(function(x){return Math.max(x.gain,0)})));
      var showRk=Math.min(rk.ranking.length,5);
      for(var ri=0;ri<showRk;ri++){
        var re=rk.ranking[ri];var me=re.isMe?' me':'';
        var pc=re.rank<=3?(' p'+re.rank):'';
        var medal=re.rank<=3?'<span class="rk-badge">'+re.rank+'</span>':'';
        var bw=maxG>0?Math.max(0,Math.round(re.gain/maxG*100)):0;
        var neg=re.gain<0?' neg':'';
        var gSign=re.gain>=0?'+':'';
        h+='<div class="rk-row'+me+'"><div class="rk-pos'+pc+'">'+medal+(re.rank>3?re.rank:'')+'</div><div class="rk-bar"><div class="rk-bar-track"><div class="rk-bar-fill" style="width:'+bw+'%"></div></div></div><div class="rk-gain'+neg+'">'+gSign+fY(re.gain)+'</div></div>';
      }
      if(rk.ranking.length>5){h+='<a class="bbs-more" href="/ranking">\u30e9\u30f3\u30ad\u30f3\u30b0\u3092\u3059\u3079\u3066\u898b\u308b \u2192</a>'}
    }
  }catch(e){}

  // BBS section
  try{
    var fakeCmts=genFakeComments(d);
    var allCmts=cmts.concat(fakeCmts);
    allCmts.sort(function(a,b){return b.createdAt-a.createdAt});
    h+='<div class="bbs-hd"><div class="bbs-title"><em>NovaLink</em>\u3000\u682a\u4e3b\u639b\u793a\u677f</div><div class="bbs-info"><span class="live">ACTIVE</span><span>'+allCmts.length+' res</span><span>\u627f\u8a8d\u5236</span></div></div>';
    h+='<div class="bbs-notice">\u6295\u7a3f\u306f\u7ba1\u7406\u8005\u306e\u78ba\u8a8d\u5f8c\u306b\u63b2\u8f09\u3055\u308c\u307e\u3059</div>';
    h+='<div class="bbs-thread">';
    if(allCmts.length===0){h+='<div class="bbs-empty">\u307e\u3060\u66f8\u304d\u8fbc\u307f\u306f\u3042\u308a\u307e\u305b\u3093</div>'}
    else{
      var show=Math.min(allCmts.length,8);
      for(var ci=0;ci<show;ci++){
        var cm=allCmts[ci];var cdt=new Date(cm.createdAt);
        var cy=cdt.getFullYear();var cmo=String(cdt.getMonth()+1).padStart(2,'0');var cd=String(cdt.getDate()).padStart(2,'0');
        var chh=cdt.getHours();var cmm=String(cdt.getMinutes()).padStart(2,'0');var css=String(cdt.getSeconds()).padStart(2,'0');
        var cds=cy+'/'+cmo+'/'+cd+' '+chh+':'+cmm+':'+css;
        var cpid=(function(s){var v=0;for(var j=0;j<s.length;j++){v=((v<<5)-v)+s.charCodeAt(j);v|=0}return(Math.abs(v)%99999).toString().padStart(5,'0')})(cm.id+String(cm.createdAt));
        h+='<div class="bbs-post"><div class="bbs-post-head"><span class="bbs-post-num">'+(allCmts.length-ci)+'</span><span class="bbs-post-name">\u540d\u7121\u3057\u306e\u682a\u4e3b\u3055\u3093</span><span class="bbs-post-date">'+cds+'</span><span class="bbs-post-id">ID:'+cpid+'</span></div>';
        h+='<div class="bbs-post-body">'+cm.text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</div></div>';
      }
    }
    h+='</div>';
    h+='<a class="bbs-more" href="/comments">\u639b\u793a\u677f\u3092\u3059\u3079\u3066\u898b\u308b \u2192</a>';
  }catch(e){}

  if(d.orders&&d.orders.length>0){
    h+='<div class="sec-head an a5">\u5c65\u6b74</div>';
    for(var i=0;i<Math.min(d.orders.length,15);i++){
      var o=d.orders[i];
      var isWd=o.type==='withdraw';
      var cls,lbl,ico;
      if(isWd){
        cls=o.status==='pending'?'withdraw pending':o.status==='approved'?'withdraw approved':'withdraw rejected';
        lbl=o.status==='pending'?'\u53d7\u4ed8\u4e2d':o.status==='approved'?'\u51fa\u91d1\u6e08':'\u5374\u4e0b';
        ico=o.status==='pending'?'...':o.status==='approved'?'OK':'NG';
      } else {
        cls=o.status==='pending'?'pending':o.status==='approved'?'approved':o.status==='confirmed'?'approved':'rejected';
        lbl=o.status==='pending'?'\u53d7\u4ed8\u4e2d':o.status==='approved'?'\u9001\u91d1\u5f85\u3061':o.status==='confirmed'?'\u5165\u91d1\u6e08':'\u5374\u4e0b';
        ico=o.status==='pending'?'...':o.status==='approved'?'\u2192':o.status==='confirmed'?'OK':'NG';
      }
      var title=isWd?'\u5229\u76ca\u78ba\u5b9a':'\u8ffd\u52a0\u6ce8\u6587';
      var dt=new Date(o.createdAt);var ds=(dt.getMonth()+1)+'/'+dt.getDate()+' '+dt.getHours()+':'+String(dt.getMinutes()).padStart(2,'0');
      var meta=isWd?ds:(o.shares?o.shares.toLocaleString()+'\u682a \u00b7 ':'')+ds;
      h+='<div class="order-item"><div class="o-badge '+cls.split(' ')[0]+'">'+ico+'</div><div class="o-info"><div class="o-title">'+title+' \u00b7 '+lbl+'</div><div class="o-meta">'+meta+'</div></div><div class="o-amount">'+fY(o.amount)+'</div></div>';
    }

function urlBase64ToUint8Array(b64){var p='='.repeat((4-b64.length%4)%4);var b=atob((b64+p).replace(/-/g,'+').replace(/_/g,'/'));var a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}

var curve4h=[
1.00,1.31,1.54,1.70,1.86,2.09,
2.51,2.74,2.93,3.19,3.56,3.97,
4.18,4.37,4.67,5.02,5.36,5.60,

function crng(s){s=Math.sin(s*12.9898+78.233)*43758.5453;return s-Math.floor(s)}
function priceAtMin(m){
var chartBase=currentData?currentData.totalDeposited:100;
var totalMins=(currentData?currentData.daysSinceStart:14)*1440;
var slot=m/240;if(slot>=curve4h.length-1)slot=curve4h.length-1.001;
var idx=Math.floor(slot),frac=slot-idx;
var a=curve4h[idx],b=curve4h[Math.min(idx+1,curve4h.length-1)];
var rawVal=chartBase*(a+(b-a)*frac);
// Scale so that current endpoint matches actual totalValue from server
if(currentData&&currentData.totalValue&&totalMins>0){
var endSlot=totalMins/240;if(endSlot>=curve4h.length-1)endSlot=curve4h.length-1.001;
var ei=Math.floor(endSlot),ef=endSlot-ei;
var endRaw=chartBase*(curve4h[ei]+(curve4h[Math.min(ei+1,curve4h.length-1)]-curve4h[ei])*ef);
if(endRaw>0)rawVal=rawVal*(currentData.totalValue/endRaw)}
var micro=Math.sin(m*0.073)*0.004+Math.cos(m*0.031)*0.003;
return rawVal*(1+micro)}
function genCandles(tf){
var mpc={'5m':5,'15m':15,'4h':240}[tf];
var elapsed=currentData?currentData.daysSinceStart:14;if(elapsed>14)elapsed=14;
var elapsedMins=elapsed*1440;
var num=Math.floor(elapsedMins/mpc);if(num<2)num=2;
var maxShow={'5m':80,'15m':80,'4h':84}[tf],start=Math.max(0,num-maxShow),out=[];
for(var i=start;i<num;i++){var sm=i*mpc,em=Math.min(sm+mpc,elapsedMins);
var bo=priceAtMin(sm),bc=priceAtMin(em);
var baseVol={'5m':0.008,'15m':0.012,'4h':0.025}[tf];
var vol=baseVol+crng(i*3.7)*baseVol*1.5;
var hod=(sm/60)%24;if(hod>=14&&hod<=20)vol*=1.4;else if(hod>=8&&hod<=12)vol*=1.2;
var o=bo*(1+(crng(i*7.3)-0.5)*vol*0.6),c=bc*(1+(crng(i*11.1)-0.5)*vol*0.6);
var wU=crng(i*2.1)*vol*(c<o?1.2:0.6),wD=crng(i*5.3)*vol*(c>=o?1.2:0.6);
var h=Math.max(o,c)*(1+wU),l=Math.min(o,c)*(1-wD);
out.push({o:o,h:h,l:l,c:c})}
var liveSm=num*mpc;if(liveSm<elapsedMins){
var liveBo=priceAtMin(liveSm);
var now=Date.now(),tick=Math.sin(now/3000)*0.006+Math.cos(now/7000)*0.004;
var liveC=priceAtMin(elapsedMins)*(1+tick);
var liveH=Math.max(liveBo,liveC)*1.003,liveL=Math.min(liveBo,liveC)*0.997;
out.push({o:liveBo,h:liveH,l:liveL,c:liveC,live:true})}
return out}
function drawChart(){
var cv=document.getElementById('chartCanvas');if(!cv)return;
var ctx=cv.getContext('2d'),r=window.devicePixelRatio||1;
var rect=cv.getBoundingClientRect();cv.width=rect.width*r;cv.height=rect.height*r;
ctx.setTransform(r,0,0,r,0,0);
var w=rect.width,h=rect.height,pad={t:6,b:20,l:4,r:44};
var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
var candles=genCandles(chartTF);if(!candles.length)return;
ctx.clearRect(0,0,w,h);
var maxP=Math.max.apply(null,candles.map(function(c){return c.h}));
var minP=Math.min.apply(null,candles.map(function(c){return c.l}));
var range=maxP-minP||1;maxP+=range*0.05;minP-=range*0.05;range=maxP-minP;
var barW=cw/candles.length,bodyW=Math.max(1,barW*0.6);
function yP(p){return pad.t+ch*(1-(p-minP)/range)}
ctx.strokeStyle='#1F1F26';ctx.lineWidth=0.5;
for(var g=0;g<5;g++){var gy=pad.t+ch*(g/4);ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(w-pad.r,gy);ctx.stroke();
var gp=maxP-range*(g/4);ctx.fillStyle='#4B5563';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='right';
ctx.fillText(gp>=10000?Math.round(gp).toLocaleString():gp.toFixed(0),w-6,gy+3)}
for(var i=0;i<candles.length;i++){var c=candles[i],x=pad.l+barW*i+barW/2,up=c.c>=c.o,col=up?'#4ADE80':'#F87171';
ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yP(c.h));ctx.lineTo(x,yP(c.l));ctx.stroke();
var top=yP(Math.max(c.o,c.c)),bot=yP(Math.min(c.o,c.c)),bh=Math.max(1,bot-top);
ctx.fillStyle=col;ctx.fillRect(x-bodyW/2,top,bodyW,bh);
if(candles[i].live){ctx.globalAlpha=0.3+Math.sin(Date.now()/400)*0.15;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.strokeRect(x-bodyW/2-1,top-1,bodyW+2,bh+2);ctx.globalAlpha=1}}
var last=candles[candles.length-1],ly=yP(last.c);
ctx.strokeStyle=last.c>=last.o?'#4ADE80':'#F87171';ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
ctx.beginPath();ctx.moveTo(pad.l,ly);ctx.lineTo(w-pad.r,ly);ctx.stroke();ctx.setLineDash([]);
ctx.fillStyle=last.c>=last.o?'#4ADE80':'#F87171';
var tw=44,th=14;ctx.beginPath();ctx.roundRect(w-pad.r+2,ly-th/2,tw,th,3);ctx.fill();
ctx.fillStyle='#111';ctx.font='bold 8px -apple-system,sans-serif';ctx.textAlign='center';
ctx.fillText(Math.round(last.c).toLocaleString(),w-pad.r+2+tw/2,ly+3);
var pe=document.getElementById('chartPrice');if(pe)pe.textContent='\u00a5'+Math.round(last.c).toLocaleString();
var first=candles[0],pct=((last.c-first.o)/first.o*100).toFixed(1);
var ce=document.getElementById('chartChg');if(ce){ce.textContent=(pct>=0?'+':'')+pct+'%';ce.className='chart-chg '+(pct>=0?'up':'dn')}
var re=document.getElementById('chartRange');if(re)re.textContent='H: \u00a5'+Math.round(maxP).toLocaleString()+' / L: \u00a5'+Math.round(minP).toLocaleString();
var ve=document.getElementById('chartVol');if(ve)ve.textContent=candles.length+' candles'}
